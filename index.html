<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نسخ رقم المحفظة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#F8F6F2;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{

background:#fff;

width:420px;

max-width:100%;

padding:35px;

border-radius:20px;

box-shadow:0 12px 35px rgba(0,0,0,.08);

text-align:center;

}

h2{

color:#123E78;

margin-bottom:12px;

font-size:28px;

}

.subtitle{

color:#777;

margin-bottom:30px;

font-size:15px;

}

.number{

font-size:34px;

font-weight:700;

color:#123E78;

letter-spacing:1px;

margin-bottom:30px;

transition:.3s;

}

button{

width:100%;

border:none;

border-radius:12px;

padding:15px;

font-size:18px;

cursor:pointer;

transition:.25s;

}

#copyBtn{

background:#123E78;

color:white;

}

#copyBtn:hover{

background:#0E3263;

}

#closeBtn{

display:none;

background:#B98A2E;

color:white;

margin-top:15px;

}

#message{

display:none;

margin-top:20px;

color:#2E7D32;

font-weight:bold;

}

.note{

display:none;

margin-top:15px;

font-size:14px;

color:#777;

}

</style>

</head>

<body>

<div class="card">

<h2>نسخ رقم المحفظة</h2>

<div class="subtitle">
اضغط الزر لنسخ الرقم ثم ارجع إلى الفاتورة.
</div>

<div class="number" id="wallet">
01515917591
</div>

<button id="copyBtn">
📋 اضغط لنسخ الرقم
</button>

<div id="message">

✅ تم نسخ الرقم بنجاح

</div>

<button id="closeBtn">

⬅️ الرجوع إلى الفاتورة

</button>

<div id="note">

إذا لم يتم الرجوع تلقائيًا يمكنك إغلاق هذه الصفحة.

</div>

</div>

<script>

const wallet="01515917591";

async function copyText(text){

if(navigator.clipboard){

await navigator.clipboard.writeText(text);

}else{

const input=document.createElement("input");

input.value=text;

document.body.appendChild(input);

input.select();

document.execCommand("copy");

input.remove();

}

}

document.getElementById("copyBtn").onclick=async()=>{

try{

await copyText(wallet);

document.getElementById("wallet").style.transform="scale(1.08)";

setTimeout(()=>{

document.getElementById("wallet").style.transform="scale(1)";

},250);

document.getElementById("message").style.display="block";

document.getElementById("copyBtn").style.display="none";

document.getElementById("closeBtn").style.display="block";

}catch{

alert("تعذر نسخ الرقم.");

}

};

document.getElementById("closeBtn").onclick=()=>{

if(window.history.length>1){

history.back();

}else{

window.close();

document.getElementById("note").style.display="block";

}

};

</script>

</body>
</html>
